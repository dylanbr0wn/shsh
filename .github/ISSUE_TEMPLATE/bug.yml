name: Bug Report
description: Something isn't working
labels: ["bug", "needs-triage"]
body:
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Add a host with key auth
        2. Connect to it
        3. Disconnect and reconnect
        4. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead? Include any error messages or logs.
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: shsh version / commit
      placeholder: "e.g. main @ abc1234"
